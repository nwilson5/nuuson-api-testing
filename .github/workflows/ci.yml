name: CI/CD

on:
  push:
    branches: [main, sandbox]
  pull_request:

jobs:
  validate:
    uses: nwilson5/cicd/.github/workflows/validate.yml@main
    with:
      python-version: "3.14"

  build-push:
    needs: validate
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/sandbox'
    permissions:
      contents: read
      packages: write
    uses: nwilson5/cicd/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/nwilson5/nuuson-api-testing

  deploy-sandbox:
    needs: build-push
    if: github.ref == 'refs/heads/sandbox'
    permissions:
      id-token: write
      contents: read
    uses: nwilson5/cicd/.github/workflows/deploy-vps.yml@main
    with:
      project: nuuson-api-testing-sandbox
      image-tag: ${{ needs.build-push.outputs.image-tag }}
      vault_addr: ${{ vars.VAULT_ADDR }}
      vault_role: project-nuuson-api-testing-sandbox
      shared_vault_paths: "secret/shared/gemini"
    secrets:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

  smoke-test-sandbox:
    needs: deploy-sandbox
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: |
          curl -sfL --retry 5 --retry-delay 5 \
            -H "CF-Access-Client-Id: ${{ secrets.CF_ACCESS_CLIENT_ID }}" \
            -H "CF-Access-Client-Secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}" \
            https://testing-sandbox-internal.nuuson.dev/health

      - name: Endpoint check
        run: |
          curl -sfL --retry 3 --retry-delay 3 \
            -H "CF-Access-Client-Id: ${{ secrets.CF_ACCESS_CLIENT_ID }}" \
            -H "CF-Access-Client-Secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}" \
            https://testing-sandbox-internal.nuuson.dev/v1/testing/hello

  open-promotion-pr:
    needs: smoke-test-sandbox
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Open sandbox → main PR if none exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list --head sandbox --base main --json number --jq length)
          if [ "$existing" -eq 0 ]; then
            gh pr create \
              --head sandbox \
              --base main \
              --title "promote: sandbox → main" \
              --body "First passing smoke test: \`${{ github.sha }}\`. Check CI status for current state."
          else
            echo "Promotion PR already open."
          fi

  deploy-prod:
    needs: build-push
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    uses: nwilson5/cicd/.github/workflows/deploy-vps.yml@main
    with:
      project: nuuson-api-testing
      image-tag: ${{ needs.build-push.outputs.image-tag }}
      vault_addr: ${{ vars.VAULT_ADDR }}
      vault_role: project-nuuson-api-testing
      shared_vault_paths: "secret/shared/gemini"
    secrets:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

  # Phase 7: open PR to nuuson-api-gateway after prod deploy.
  # Requires secret/shared/github GH_PAT in Vault — not yet configured.
